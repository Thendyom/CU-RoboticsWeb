name: Publication candidates

on:
  workflow_dispatch:
  schedule:
    - cron: '17 6 1 * *'

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Refresh publication candidates
        env:
          # OpenAlex is the configured source for this repository and this
          # monthly run stays within its free usage allowance.
          PUBLICATION_PROVIDER: openalex
          OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
        run: node scripts/update-publication-candidates.mjs

      - name: Commit publication update
        run: |
          if [ -n "$(git status --porcelain assets/data/publication-candidates.json assets/js/generated-publications.js)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add assets/data/publication-candidates.json assets/js/generated-publications.js
            git commit -m "Update publication candidates"
            git push
          else
            echo "No publication changes."
          fi
